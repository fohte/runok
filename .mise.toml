[tools]
lefthook = "2.1.8"
"github:ast-grep/ast-grep" = "0.42.3"

# lefthook hooks
actionlint = "1.7.12"
node = "24.15.0"
pinact = "3.10.1"
"github:fohte/basefmt" = "0.1.0"
"npm:@commitlint/cli" = "21.0.1"
"npm:prettier" = "3.8.3"
shellcheck = "0.11.0"
