name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  release:
    types:
      - published

permissions:
  contents: read
  deployments: write

jobs:
  build-docs:
    # release-please's publish-nightly job deletes and recreates the nightly
    # (prerelease) release on almost every push to main, re-firing
    # `release: published` each time. Excluding prereleases keeps that
    # churn from triggering a docs build/deploy.
    if: github.event_name != 'release' || !github.event.release.prerelease
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: docs/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify llms.txt generation
        run: |
          test -s dist/llms.txt || { echo "llms.txt is empty or not found"; exit 1; }
          test -s dist/llms-full.txt || { echo "llms-full.txt is empty or not found"; exit 1; }

      - name: Verify Pagefind index
        run: test -d dist/pagefind || { echo "Pagefind index not found"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-dist
          path: docs/dist

  # Determines whether the pushed commit(s) touch only docs/**, using the
  # GitHub compare API instead of a local `git diff` so the default shallow
  # checkout (fetch-depth: 1) elsewhere in this workflow doesn't need widening.
  docs-only-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - name: Check whether this push only touches docs/**
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.event.after }}
        run: |
          echo "Comparing $BASE_SHA...$HEAD_SHA"

          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(gh api "repos/${{ github.repository }}/compare/${BASE_SHA}...${HEAD_SHA}" --jq '[.files[].filename]')
          count=$(echo "$files" | jq 'length')
          echo "Changed files ($count): $files"

          if [[ "$count" -ge 300 ]]; then
            # The compare API caps the files list at 300 entries, so a push
            # touching more files than that can't be verified as docs-only
            # from this response alone -- fail safe and wait for the next
            # release instead of risking a false "docs only".
            docs_only=false
          else
            docs_only=$(echo "$files" | jq 'length > 0 and all(startswith("docs/"))')
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [build-docs, docs-only-push]
    runs-on: ubuntu-latest
    if: |
      always() && needs.build-docs.result == 'success' && (
        (github.event_name == 'release' && !github.event.release.prerelease) ||
        needs.docs-only-push.outputs.docs_only == 'true'
      )
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=runok-docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  preview:
    needs: build-docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-dist
          path: dist

      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            exit 1
          fi

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=runok-docs --branch="$BRANCH_NAME"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
