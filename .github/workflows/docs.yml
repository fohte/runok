name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: docs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify llms.txt generation
        run: |
          test -s dist/llms.txt || { echo "llms.txt is empty or not found"; exit 1; }
          test -s dist/llms-full.txt || { echo "llms-full.txt is empty or not found"; exit 1; }

      - name: Verify Pagefind index
        run: test -d dist/pagefind || { echo "Pagefind index not found"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=runok-docs

  preview:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: dist

      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^[a-zA-Z0-9/_.-]+$ ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            exit 1
          fi

      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=runok-docs --branch="$BRANCH_NAME"
