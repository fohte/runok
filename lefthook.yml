remotes:
  - git_url: https://github.com/fohte/lefthook-config.git
    ref: v0.1.16 # renovate: datasource=github-tags depName=fohte/lefthook-config
    configs:
      - base.yml
      - rust.yml

pre-commit:
  commands:
    ast-grep:
      glob: '*.rs'
      run: ast-grep scan {staged_files}
    generate-json-schema:
      glob: '*.rs'
      run: cargo run --features config-schema -- config-schema > schema/runok.schema.json && git add schema/runok.schema.json
